<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senin İçin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#0a0a0f;
color:#fff;
font-family:'Inter',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
}
.container{
width:100%;
max-width:520px;
padding:20px 16px 40px;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}
header{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:700;
background:linear-gradient(135deg,#f5cfa0,#f0a8b8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:2px;
margin-bottom:4px;
}
.photo-container{
width:100%;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 40px rgba(240,168,184,0.15);
}
.photo-container img{
width:100%;
display:block;
aspect-ratio:4/5;
object-fit:cover;
}
.controls{
display:flex;
align-items:center;
justify-content:center;
gap:24px;
width:100%;
padding:8px 0;
}
.controls button{
background:none;
border:none;
color:#fff;
font-size:28px;
cursor:pointer;
transition:all .2s;
width:52px;
height:52px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}
.controls button:hover{background:rgba(255,255,255,0.06)}
.controls button:active{transform:scale(.92)}
#playBtn{
background:linear-gradient(135deg,#f5cfa0,#f0a8b8);
font-size:22px;
width:60px;height:60px;
box-shadow:0 4px 20px rgba(240,168,184,0.3);
color:#0a0a0f;
}
#playBtn:hover{box-shadow:0 4px 28px rgba(240,168,184,0.45)}
.progress-container{
width:100%;
display:flex;
align-items:center;
gap:12px;
font-size:12px;
color:rgba(255,255,255,0.4);
}
progress{
width:100%;
height:4px;
-webkit-appearance:none;
appearance:none;
border-radius:2px;
overflow:hidden;
cursor:pointer;
background:rgba(255,255,255,0.1);
}
progress::-webkit-progress-bar{background:rgba(255,255,255,0.08);border-radius:2px}
progress::-webkit-progress-value{
background:linear-gradient(90deg,#f5cfa0,#f0a8b8);
border-radius:2px;
transition:width .1s linear;
}
progress::-moz-progress-bar{
background:linear-gradient(90deg,#f5cfa0,#f0a8b8);
border-radius:2px;
}
.note-section{
width:100%;
margin-top:8px;
}
.note-btn{
width:100%;
padding:14px;
border:1px dashed rgba(245,207,160,0.25);
border-radius:12px;
background:rgba(245,207,160,0.04);
color:#f5cfa0;
font-family:'Inter',sans-serif;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:all .3s;
letter-spacing:1px;
}
.note-btn:hover{
background:rgba(245,207,160,0.08);
border-color:rgba(245,207,160,0.4);
}
.note-panel{
width:100%;
max-height:0;
overflow:hidden;
transition:max-height .5s ease, opacity .4s ease, padding .4s ease;
opacity:0;
padding:0 20px;
background:rgba(255,255,255,0.03);
border-radius:12px;
border:1px solid rgba(245,207,160,0.08);
}
.note-panel.open{
max-height:600px;
opacity:1;
padding:24px 20px;
}
.note-panel .note-text{
font-family:'Playfair Display',serif;
font-size:17px;
line-height:1.8;
color:rgba(255,255,255,0.85);
white-space:pre-line;
text-align:center;
}
.note-panel .close-note{
margin-top:20px;
padding:10px 32px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#f5cfa0,#f0a8b8);
color:#0a0a0f;
font-family:'Inter',sans-serif;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:all .2s;
}
.note-panel .close-note:hover{transform:scale(1.04)}
@media(max-width:400px){
.container{padding:16px 12px 32px}
header{font-size:24px}

.controls{gap:16px}
#playBtn{width:54px;height:54px;font-size:20px}
}
</style>
</head>
<body>
<div class="container">
<header>Senin İçin</header>

<div class="photo-container">
  <img id="mainPhoto" src="foto1.jpg" alt="fotoğraf" loading="lazy">
</div>

<div class="controls">
<button id="prevBtn">&#x23EE;</button>
<button id="playBtn">&#x25B6;</button>
<button id="nextBtn">&#x23ED;</button>
</div>

<div class="progress-container">
<span id="currentTime">0:00</span>
<progress id="progressBar" value="0" max="100"></progress>
<span id="duration">0:00</span>
</div>

<div class="note-section">
<button class="note-btn" id="noteBtn">&#x2727; Notu Aç &#x2727;</button>
<div class="note-panel" id="notePanel">
<div class="note-text" id="noteText"></div>
<button class="close-note" id="closeNoteBtn">Kapat</button>
</div>
</div>

</div>

<audio id="audioPlayer" preload="none"></audio>

<script>
var songs=[
{title:"Şarkı 1",artist:"Sanatçı 1",audio:"sarki1.mp3",photo:"foto1.jpg",note:"İyi günümde kötü günümde en mutlu anımda en en hüzünlü anımda sadece sen gerek her zaman ve her yerde bana sen gereksin Yanımdan asla ayrılma Bitanem"},
{title:"Şarkı 2",artist:"Sanatçı 2",audio:"sarki2.mp3",photo:"foto2.jpg",note:"Evimsin Ailemsin Herşeyimsin inşallah ayrılmayız en çıkmaz sokağa girsek bile bir yolunu bulalım çıkalım olaki başaramazsak bu şarkıyı hatırla ;)"},
{title:"Şarkı 3",artist:"Sanatçı 3",audio:"sarki3.mp3",photo:"foto3.jpg",note:"Sen sırtına bana yasla birbirimizin yanında olalım herşeyin üstesinden geliriz güzelim senin benden benim senden başka kimsemiz yok bunu bilerek hareket edelim ve her konuda birb,r,m,z,n en büyük destekçisi olalım"},
{title:"Şarkı 4",artist:"Sanatçı 4",audio:"sarki4.mp3",photo:"foto4.jpg",note:"Ya abartma derken neyden bahsediyosun sen kaşına gözüne dudağına ayrı güzel başbaşka aşığım sana deli ediyosun beni Güzelimm Senin gibi güzelliğe sahip olmak için kendimden vzgeçerim ben ya "},
{title:"Şarkı 5",artist:"Sanatçı 5",audio:"sarki5.mp3",photo:"foto5.jpg",note:"Seni kaybetmekten çok korkuyorum senin hayal ettiğin gibi olmayabilirim ama seni hayal ettiğinden çok seviyorum hiç bir zaman senden vazgeçmicem yarın öleceğimi bilsem bugün yine senin mutlu olman için çabalardım..."},
];

var currentIndex = 0;
var isPlaying = false;
var noteOpen = false;
var isLoading = false;

var audio = document.getElementById('audioPlayer');
var photo = document.getElementById('mainPhoto');
var playBtn = document.getElementById('playBtn');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');
var progressBar = document.getElementById('progressBar');
var currentTimeEl = document.getElementById('currentTime');
var durationEl = document.getElementById('duration');

var noteBtn = document.getElementById('noteBtn');
var notePanel = document.getElementById('notePanel');
var noteTextEl = document.getElementById('noteText');
var closeNoteBtn = document.getElementById('closeNoteBtn');

function loadSong(index){
var song = songs[index];
currentIndex = index;
audio.src = song.audio;
audio.load();
photo.src = song.photo;
noteTextEl.textContent = song.note;
}

function preloadNext(){
var i = currentIndex + 1;
if(i >= songs.length) return;
var img = new Image();
img.src = songs[i].photo;
}

function togglePlay(){
if(!songs.length || noteOpen) return;
if(isPlaying){
audio.pause();
playBtn.textContent = '\u25B6';
isPlaying = false;
}else{
audio.play().then(function(){
playBtn.textContent = '\u23F8';
isPlaying = true;
}).catch(function(){});
}
}

function prevSong(){
if(noteOpen) return;
var i = currentIndex - 1;
if(i < 0) i = songs.length - 1;
loadSong(i);
audio.play().then(function(){
playBtn.textContent = '\u23F8';
isPlaying = true;
}).catch(function(){});
}

function nextSong(){
if(noteOpen) return;
var i = currentIndex + 1;
if(i >= songs.length){
audio.pause();
isPlaying = false;
playBtn.textContent = '\u25B6';
loadSong(songs.length - 1);
showVideo();
return;
}
loadSong(i);
audio.play().then(function(){
playBtn.textContent = '\u23F8';
isPlaying = true;
}).catch(function(){});
}

function showVideo(){
window.location.href = "video.html";
}

function formatTime(s){
var m = Math.floor(s / 60);
var sec = Math.floor(s % 60);
return m + ':' + (sec < 10 ? '0' : '') + sec;
}

audio.addEventListener('loadedmetadata', function(){
durationEl.textContent = formatTime(audio.duration);
});

audio.addEventListener('timeupdate', function(){
if(audio.duration){
var pct = (audio.currentTime / audio.duration) * 100;
progressBar.value = pct || 0;
currentTimeEl.textContent = formatTime(audio.currentTime);
}
});

audio.addEventListener('ended', function(){
if(currentIndex < songs.length - 1){
nextSong();
}else{
isPlaying = false;
playBtn.textContent = '\u25B6';
showVideo();
}
});

audio.addEventListener('play', function(){
isPlaying = true;
playBtn.textContent = '\u23F8';
preloadNext();
});

audio.addEventListener('pause', function(){
isPlaying = false;
playBtn.textContent = '\u25B6';
});

audio.addEventListener('waiting', function(){
playBtn.textContent = '\u23F3';
});

audio.addEventListener('canplay', function(){
if(isPlaying) playBtn.textContent = '\u23F8';
});

audio.addEventListener('error', function(){
playBtn.textContent = '\u25B6';
isPlaying = false;
});

progressBar.addEventListener('click', function(e){
if(audio.duration){
var rect = progressBar.getBoundingClientRect();
var pct = (e.clientX - rect.left) / rect.width;
audio.currentTime = pct * audio.duration;
}
});

playBtn.addEventListener('click', togglePlay);
prevBtn.addEventListener('click', prevSong);
nextBtn.addEventListener('click', nextSong);

noteBtn.addEventListener('click', function(){
notePanel.classList.toggle('open');
noteOpen = notePanel.classList.contains('open');
noteBtn.textContent = noteOpen ? '\u2727 Notu Kapat \u2727' : '\u2727 Notu A\u00E7 \u2727';
});

closeNoteBtn.addEventListener('click', function(){
notePanel.classList.remove('open');
noteOpen = false;
noteBtn.textContent = '\u2727 Notu A\u00E7 \u2727';
});

loadSong(0);
</script>
</body>
</html>
