<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senin İçin - Video</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
color:#fff;
font-family:'Inter',sans-serif;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:16px;
overflow:hidden;
}
h2{
font-family:'Playfair Display',serif;
font-size:22px;
background:linear-gradient(135deg,#f5cfa0,#f0a8b8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:12px;
text-align:center;
flex-shrink:0;
}
.video-container{
width:100%;
flex:1;
display:flex;
align-items:center;
justify-content:center;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 60px rgba(240,168,184,0.2);
max-height:calc(100vh - 120px);
}
.video-container video{
width:100%;
height:100%;
display:block;
object-fit:contain;
background:#111;
}
.back-btn{
margin-top:12px;
padding:12px 36px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#f5cfa0,#f0a8b8);
color:#0a0a0f;
font-family:'Inter',sans-serif;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:all .2s;
flex-shrink:0;
}
.back-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(240,168,184,0.3)}
</style>
</head>
<body>
<h2>&#x1F3AC; Senin İçin</h2>
<div class="video-container">
<video id="mainVideo" controls autoplay>
<source src="video.mp4" type="video/mp4">
</video>
</div>
<button class="back-btn" onclick="window.location.href='index.html'">&#x2190; Geri Dön</button>
<script>
var video = document.getElementById('mainVideo');
video.addEventListener('error', function(){
alert('Video dosyası bulunamadı. Lütfen video.mp4 dosyasını klasöre ekleyin.');
});
</script>
</body>
</html>
